services:
  # Flask 后端服务
  backend:
    build: .
    container_name: rgcn_backend
    # 保持与原脚本一致的 Gunicorn 配置
    command: gunicorn -w 1 -b 0.0.0.0:8000 --timeout 120 wsgi:app
    ports:
      - "8000:8000"
    volumes:
      - .:/app  # 将当前目录映射到容器的 /app
    environment:
      - WX_APPID=${WX_APPID}
      - WX_SECRET=${WX_SECRET}
      - REDIS_HOST=redis
    restart: always
    depends_on:
      - redis

  # Celery Worker 服务
  worker:
    build: .
    container_name: rgcn_worker
    # 使用与 start_backend.sh 一致的 Celery 参数
    command: celery -A tasks_docker.celery_app worker --concurrency=1 --loglevel=info
    volumes:
      - .:/app
    environment:
      - REDIS_HOST=redis
      - WX_APPID=${WX_APPID}
      - WX_SECRET=${WX_SECRET}
    restart: always
    depends_on:
      - redis
      - backend

  # Redis 服务 (作为消息中间件)
  redis:
    image: redis:alpine
    container_name: rgcn_redis
    restart: always